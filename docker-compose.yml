version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: miru_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-miru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-miru_secret}
      POSTGRES_DB: ${POSTGRES_DB:-miru_db}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U miru']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: miru_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      target: development
    container_name: miru_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-miru}:${POSTGRES_PASSWORD:-miru_secret}@postgres:5432/${POSTGRES_DB:-miru_db}
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    ports:
      - '3333:3333'
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
